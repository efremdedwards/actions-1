name: My First Workflow

on: push

jobs:
  first_job:
    runs-on: ubuntu-latest
    steps:
      # Add this step to clone your repository onto the runner
      - name: Checkout repository code
        uses: actions/checkout@v4

      # Now your existing steps will work as expected
      - name: Welcome message
        run: echo "my first Github Actions job"
      
      - name: List files
        run: ls
      
      - name: Read file
        run: cat README.md
